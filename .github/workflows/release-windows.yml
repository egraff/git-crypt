on:
  release:
    types: [published]
  workflow_dispatch:

name: Build Release Binary (Windows)
jobs:
  build:
    name: Build Release Binary
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            msys2-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-openssl
            openssl-devel
      - name: Build binary
        shell: msys2 {0}
        run: make LDFLAGS="-static-libstdc++ -static -lcrypto -lws2_32 -lcrypt32" ENABLE_MAN=no
      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: git-crypt-artifacts
          path: git-crypt.exe
  upload:
    name: Upload Release Binary
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: git-crypt-artifacts
      - name: Upload release asset
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs').promises;

            if (!context.payload.release)
            {
              core.notice('Not a release');
              return;
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              name: `git-crypt-${context.payload.release.tag_name}-x86_64.exe`,
              data: await fs.readFile('git-crypt.exe'),
            });
